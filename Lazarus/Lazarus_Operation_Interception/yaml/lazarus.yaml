# Lazarus.yaml - CALDERA Emulation Plan Format

- emulation_plan_details:
    id: d6215328-94ef-4b47-b8f2-8c9e6e14713a
    adversary_name: Lazarus_Emulation
    adversary_description: Emulation of a Lazarus Group attack graph based on AttackIQ intelligence. Employs Masquerading, Scheduled Tasks (HPSync), XSL Script Processing, Windows Service creation, Rundll32, Regsvr32 execution, and Network Connection Discovery.
    attack_version: 8.1
